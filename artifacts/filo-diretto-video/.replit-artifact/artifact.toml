kind = "video"
previewPath = "/"
title = "Filo Diretto — Video"
version = "1.0.0"
id = "artifacts/filo-diretto-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23603

[services.development]
run = "pnpm --filter @workspace/filo-diretto-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/filo-diretto-video", "run", "build" ]
publicDir = "artifacts/filo-diretto-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23603"
BASE_PATH = "/"
